apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: frontend-latency
  namespace: online-boutique
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: frontend
  delay:
    latency: "100ms"
  #   correlation: "25"
  #   jitter: "50ms"
  # loss:
  #   loss: "20"
  #   correlation: "25"
  direction: to
  duration: "5m"

  #10ms : 77s
  #20ms : 32s
  #30ms : 63s
  #40ms : 32s
  #50ms : 32s
  #60ms : 33s
  #70ms : 32s
  #80ms : 32s
  #90ms : 2s
  #100ms : 2s
  #110ms : 17s



