apiVersion: v1
kind: ServiceAccount
metadata:
  name: mesh-observer-sa
  namespace: graywatcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mesh-observer-role
rules:
# Allow accessing services in all namespaces
- apiGroups: [""]
  resources: ["services", "services/proxy"]
  verbs: ["get", "list"]

# Allow accessing endpoints
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list"]

# Allow accessing pods (for Prometheus discovery)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mesh-observer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mesh-observer-role
subjects:
- kind: ServiceAccount
  name: mesh-observer-sa
  namespace: graywatcher