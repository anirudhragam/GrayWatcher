# RBAC configuration for Infra Observer

# ServiceAccount for Infra Observer
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-observer-sa
  namespace: graywatcher
---
# ClusterRole with permissions to read pods and pod metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-observer-role
rules:
# Read pods from Kubernetes API
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Read pod metrics from Metrics Server
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
# ClusterRoleBinding to bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-observer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infra-observer-role
subjects:
- kind: ServiceAccount
  name: infra-observer-sa
  namespace: graywatcher